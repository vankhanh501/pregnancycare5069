<!DOCTYPE html>
<html>
<head>
    <title>Test Pay</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        Pi.init({ version: "2.0" });
        
        const API_URL = 'https://pregnancycare5069.vercel.app';
        
        function pay() {
            Pi.authenticate(['payments'], function() {}).then(function(auth) {
                alert("✅ Authenticated!");
                
                Pi.createPayment({
                    amount: 0.01,
                    memo: "test",
                    metadata: {}
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        alert("✅ Payment ID: " + paymentId);
                        
                        // Gọi API approve với URL đầy đủ
                        fetch(API_URL + '/api/approve', {
                            method: 'POST',
                            headers: {
                                'Authorization': 'Bearer ' + auth.accessToken,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ paymentId: paymentId })
                        }).then(function(r) { 
                            return r.json(); 
                        }).then(function(d) {
                            alert("✅ Approved! " + JSON.stringify(d));
                        }).catch(function(e) {
                            alert("❌ Error: " + e.message);
                        });
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        alert("✅ TXID: " + txid);
                        
                        fetch(API_URL + '/api/complete', {
                            method: 'POST',
                            headers: {
                                'Authorization': 'Bearer ' + auth.accessToken,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ paymentId: paymentId, txid: txid })
                        }).then(function(r) {
                            return r.json();
                        }).then(function() {
                            alert("✅ Complete!");
                            setTimeout(function() { window.location.reload(); }, 2000);
                        }).catch(function(e) {
                            alert("❌ Error: " + e.message);
                        });
                    },
                    onCancel: function() { alert("Cancelled"); },
                    onError: function(e) { alert("Error: " + e.message); }
                });
            }).catch(function(e) {
                alert("❌ Auth error: " + e.message);
            });
        }
    </script>
</head>
<body>
    <h1>Test Payment</h1>
    <button onclick="pay()" style="padding:20px; background:#8B5CF6; color:white; border:none; border-radius:8px; font-size:18px;">
        Pay 0.01 Pi
    </button>
</body>
</html>
