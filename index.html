<!DOCTYPE html>
<html>
<head>
    <title>Pregnancy Care Testnet</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        Pi.init({ version: "2.0" });

        function payPi() {
            Pi.authenticate(['payments'], function(payment) {
                console.log("Incomplete:", payment);
            }).then(function(auth) {
                console.log("✅ Auth OK");
                
                Pi.createPayment({
                    amount: 0.01,
                    memo: "Test payment",
                    metadata: { test: true }
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        console.log("✅ Approval:", paymentId);
                        // Tự động approve ngay trên trình duyệt
                        fetch('https://api.minepi.com/v2/payments/' + paymentId + '/approve', {
                            method: 'POST',
                            headers: {
                                'Authorization': 'Bearer ' + auth.accessToken,
                                'Content-Type': 'application/json'
                            }
                        }).then(r => r.json()).then(console.log);
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        console.log("✅ Complete:", txid);
                        fetch('https://api.minepi.com/v2/payments/' + paymentId + '/complete', {
                            method: 'POST',
                            headers: {
                                'Authorization': 'Bearer ' + auth.accessToken,
                                'Content-Type': 'application/json'
                            }
                        }).then(r => r.json()).then(function() {
                            alert("✅ Thanh toán thành công!");
                            // Tự động reload để đếm số giao dịch
                            setTimeout(function() {
                                window.location.reload();
                            }, 2000);
                        });
                    },
                    onCancel: function(paymentId) {
                        alert("❌ Bạn đã hủy!");
                    },
                    onError: function(error) {
                        alert("❌ Lỗi: " + error.message);
                    }
                });
            }).catch(function(err) {
                alert("❌ Lỗi xác thực: " + err.message);
            });
        }
    </script>
</head>
<body>
    <h1>🧡 Pregnancy Care Testnet</h1>
    <button onclick="payPi()" style="padding:20px 40px; background:#8B5CF6; color:white; border:none; border-radius:12px; font-size:20px;">
        💜 Thanh toán 0.01 Pi Testnet
    </button>
</body>
</html>
