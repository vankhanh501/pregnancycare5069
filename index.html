<!DOCTYPE html>
<html>
<head>
    <title>🧡 Pregnancy Care</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>🧡 Pregnancy Care</h1>
    <button onclick="pay()" style="padding:20px 40px; background:#8B5CF6; color:white; border:none; border-radius:12px; font-size:20px;">
        💜 Pay 0.01 Pi Testnet
    </button>
    <script>
        Pi.init({ version: "2.0" });
        function pay() {
            Pi.authenticate(['payments'], function() {}).then(function(auth) {
                Pi.createPayment({
                    amount: 0.01,
                    memo: "Test",
                    metadata: { test: true }
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        // Gọi thẳng Pi API từ trình duyệt
                        var xhr = new XMLHttpRequest();
                        xhr.open('POST', 'https://api.minepi.com/v2/payments/' + paymentId + '/approve', true);
                        xhr.setRequestHeader('Authorization', 'Bearer ' + auth.accessToken);
                        xhr.setRequestHeader('Content-Type', 'application/json');
                        xhr.send(JSON.stringify({}));
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        var xhr = new XMLHttpRequest();
                        xhr.open('POST', 'https://api.minepi.com/v2/payments/' + paymentId + '/complete', true);
                        xhr.setRequestHeader('Authorization', 'Bearer ' + auth.accessToken);
                        xhr.setRequestHeader('Content-Type', 'application/json');
                        xhr.send(JSON.stringify({}));
                        alert("✅ Hoàn tất!");
                    },
                    onCancel: function() { alert("❌ Đã hủy"); },
                    onError: function(e) { alert("❌ Lỗi: " + e.message); }
                });
            });
        }
    </script>
</body>
</html>
