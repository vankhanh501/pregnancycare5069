<!DOCTYPE html>
<html>
<head>
    <title>Pregnancy Care Testnet</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        Pi.init({ version: "2.0" });

        function authenticateAndPay() {
            Pi.authenticate(['payments'], function(payment) {
                console.log("Incomplete payment:", payment);
            }).then(function(auth) {
                console.log("Auth success:", auth);
                
                // Tạo thanh toán với đầy đủ callback
                Pi.createPayment({
                    amount: 0.01,
                    memo: "Test payment",
                    metadata: { test: true }
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        console.log("Ready for server approval:", paymentId);
                        // Gửi paymentId lên server của bạn (nếu có)
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        console.log("Payment completed:", txid);
                        alert("✅ Thanh toán thành công! Mã giao dịch: " + txid);
                    },
                    onCancel: function(paymentId) {
                        console.log("Payment cancelled:", paymentId);
                        alert("❌ Giao dịch đã bị hủy");
                    },
                    onError: function(error, payment) {
                        console.error("Payment error:", error);
                        alert("❌ Lỗi: " + error.message);
                    }
                });
            }).catch(function(error) {
                alert("❌ Lỗi xác thực: " + (error.message || error));
            });
        }
    </script>
</head>
<body>
    <h1>❤️ Pregnancy Care Testnet</h1>
    <p>Nhấn nút bên dưới để xác thực và thanh toán:</p>
    <button onclick="authenticateAndPay()" style="padding:15px 30px; background:#8B5CF6; color:white; border:none; border-radius:8px; font-size:18px; cursor:pointer;">
        💜 Xác thực & Thanh toán 0.01 Pi
    </button>
</body>
</html>
