<!DOCTYPE html>
<html>
<head>
    <title>Pay Testnet</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        Pi.init({ version: "2.0" });
        
        async function doPayment() {
            try {
                alert("🔄 Đang xác thực...");
                const auth = await Pi.authenticate(['payments'], function(payment) {
                    console.log("Incomplete payment:", payment);
                });
                alert("✅ Xác thực thành công!");
                
                alert("🔄 Đang tạo thanh toán...");
                Pi.createPayment({
                    amount: 0.01,
                    memo: "test",
                    metadata: { test: true }
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        alert("✅ Payment ID: " + paymentId);
                        fetch('https://pregnancycare5069.up.railway.app/api/approve', {
                            method: 'POST',
                            headers: {
                                'Authorization': 'Bearer ' + auth.accessToken,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ paymentId: paymentId })
                        }).then(function(r) { return r.json(); })
                        .then(function(d) {
                            console.log('Approve done:', d);
                        }).catch(function(e) {
                            console.error('Approve fetch error:', e.message);
                        });
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        alert("✅ TXID: " + txid);
                        fetch('https://pregnancycare5069.up.railway.app/api/complete', {
                            method: 'POST',
                            headers: {
                                'Authorization': 'Bearer ' + auth.accessToken,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ paymentId: paymentId, txid: txid })
                        }).then(function() {
                            alert("✅ Hoàn tất!");
                            setTimeout(function() { location.reload(); }, 2000);
                        });
                    },
                    onCancel: function(paymentId) {
                        alert("❌ Đã hủy");
                    },
                    onError: function(error, payment) {
                        alert("❌ Lỗi: " + error.message);
                    }
                });
                
            } catch (error) {
                alert("❌ Lỗi xác thực: " + error.message);
            }
        }
    </script>
</head>
<body>
    <h1>🧡 Pi Testnet Payment</h1>
    <p>Nhấn nút để thanh toán 0.01 Pi Testnet</p>
    <button onclick="doPayment()" style="padding:20px 40px; background:#8B5CF6; color:white; border:none; border-radius:12px; font-size:20px; cursor:pointer;">
        💜 Pay 0.01 Pi
    </button>
</body>
</html>
